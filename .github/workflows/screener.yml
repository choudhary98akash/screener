name: Nifty Screener

on:
  schedule:
    - cron: "0 4 * * 1-5"   # 9:30 AM IST (UTC 4:00)
    - cron: "0 10 * * 1-5"  # 3:30 PM IST (UTC 10:00)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write

jobs:
  screener:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run screener (auto mode)
        run: python daily_screener.py auto
        env:
          TZ: Asia/Kolkata

      - name: Commit & push changes
        run: |
          git config user.name "nifty-screener-bot"
          git config user.email "bot@nifty-screener"
          git add -A
          git diff --staged --quiet || git commit -m "daily screener: $(date +'%Y-%m-%d %H:%M')"
          git push
