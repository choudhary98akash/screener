name: Paper Trader — Morning Picks + Evening Verdict

on:
  schedule:
    - cron: '45 22 * * 0-4'  # 22:45 UTC = 4:15 AM IST (morning picks)
    - cron: '0 5 * * 1-5'    # 5:00 UTC = 10:30 AM IST (evening verdict)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r paper_trader/requirements.txt

      - name: Run paper trader
        run: python paper_trader/trader.py

      - name: Commit results
        run: |
          git config user.name "paper-trader-bot"
          git config user.email "bot@paper-trade.local"
          git add index.html paper_trader/ledger.json
          git diff --cached --quiet || git commit -m "Paper trade $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push

      - name: Copy index.html to deploy dir
        run: cp index.html paper_trader/index.html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./paper_trader
          destination_dir: paper-trading
